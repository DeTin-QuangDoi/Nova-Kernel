name: 🚀NovaKernel A73 Build

on:
  workflow_dispatch:
    inputs:
      debug:
        description: "SELinux permissive (debug build)"
        required: false
        type: boolean
        default: false

concurrency:
  group: nova-build-a73xq
  cancel-in-progress: true

jobs:
  build:
    name: "A73 [KSU]"
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget jq unzip tar lz4 zip \
            bc bison flex libssl-dev libelf-dev \
            python3 python3-pip cpio rsync \
            make gcc g++ binutils
          echo "All packages installed"

      - name: Cache toolchains
        id: tc-cache
        uses: actions/cache@v4
        with:
          path: toolchain
          key: nova-tc-clang-r530567-images-v2
          restore-keys: |
            nova-tc-clang-r530567-

      - name: Download toolchains if not cached
        if: steps.tc-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain/gcc/linux-x86/aarch64
          cd toolchain/gcc/linux-x86/aarch64
          echo "Downloading gcc aarch64-linux-android-4.9..."
          git clone --depth=1 --branch master https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 aarch64-linux-android-4.9 || (echo "GCC download failed"; exit 1)
          cd ../../../../
          mkdir -p toolchain/llvm-arm-toolchain-ship/10.0
          cd toolchain/llvm-arm-toolchain-ship/10.0
          echo "Downloading clang r530567..."
          wget -v https://github.com/llvm/llvm-project/releases/download/llvmorg-10.0.1/clang+llvm-10.0.1-x86_64-linux-gnu-ubuntu-16.04.tar.xz -O clang.tar.xz || (echo "Clang download failed"; exit 1)
          tar -xf clang.tar.xz --strip-components=1
          rm clang.tar.xz
          echo "Toolchains downloaded"

      - name: Verify toolchains
        run: |
          ls -la toolchain/llvm-arm-toolchain-ship/10.0/bin/clang
          ls -la toolchain/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin/aarch64-linux-android-gcc

      - name: Cache kernel out/
        uses: actions/cache@v4
        with:
          path: out/
          key: "nova-kbuild-a73xq-ksu-${{ github.sha }}"
          restore-keys: |
            nova-kbuild-a73xq-ksu-

      - name: Build kernel
        env:
          DEBUG: ${{ github.event.inputs.debug }}
        run: |
          chmod +x build_kernel.sh
          ./build_kernel.sh
        timeout-minutes: 120

      - name: Locate output Image
        id: find-image
        run: |
          IMAGE="$(pwd)/arch/arm64/boot/Image"
          if [[ ! -f "$IMAGE" ]]; then
            echo "::error::No Image found — build may have failed"
            exit 1
          fi
          echo "image_path=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "image_name=Image" >> "$GITHUB_OUTPUT"
          echo "SHA256: $(sha256sum "$IMAGE" | awk '{print $1}')"
          echo "Size  : $(du -sh "$IMAGE" | cut -f1)"

      - name: Upload kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Image-a73xq-ksu
          path: ${{ steps.find-image.outputs.image_path }}
          retention-days: 5
          compression-level: 0

      - name: Write job summary
        if: always()
        run: |
          IMAGE="${{ steps.find-image.outputs.image_name }}"
          echo "## NovaKernel A73 Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Device:** \`a73xq\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Type:** KSU (ReSukiSU + Susfs 2.1.0)" >> "$GITHUB_STEP_SUMMARY"
          echo "**Debug:** ${{ github.event.inputs.debug }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$IMAGE" ]; then echo "**Output:** \`$IMAGE\`" >> "$GITHUB_STEP_SUMMARY"; else echo "**Build failed** - no Image produced" >> "$GITHUB_STEP_SUMMARY"; fi

