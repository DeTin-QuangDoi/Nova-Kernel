name: 🚀NovaKernel A73 Build

on:
  workflow_dispatch:
    inputs:
      debug:
        description: "SELinux permissive (debug build)"
        required: false
        type: boolean
        default: false

concurrency:
  group: nova-build-a73xq
  cancel-in-progress: true

jobs:
  build:
    name: "A73 [KSU]"
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget jq unzip tar lz4 zip \
            bc bison flex libssl-dev libelf-dev \
            python3 python3-pip cpio rsync \
            make gcc g++ binutils
          echo "All packages installed"

      - name: Cache toolchains and stock images
        id: tc-cache
        uses: actions/cache@v4
        with:
          path: ~/toolchains
          key: nova-tc-clang-r530567-images-v2
          restore-keys: |
            nova-tc-clang-r530567-

      - name: Cache kernel out/
        uses: actions/cache@v4
        with:
          path: out/
          key: "nova-kbuild-a73xq-ksu-${{ github.sha }}"
          restore-keys: |
            "nova-kbuild-a73xq-ksu-"

      - name: Build kernel
        env:
          NK_VARIANT:  a73xq
          NK_KSU:      true
          DEBUG:        ${{ github.event.inputs.debug }}
        run: |
          chmod +x build_kernel.sh
          ./build_kernel.sh
        timeout-minutes: 120

      - name: Locate output Image
        id: find-image
        run: |
          IMAGE="$(pwd)/arch/arm64/boot/Image"
          if [[ ! -f "$IMAGE" ]]; then
            echo "::error::No Image found — build may have failed"
            exit 1
          fi
          echo "image_path=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "image_name=Image" >> "$GITHUB_OUTPUT"
          echo "SHA256: $(sha256sum "$IMAGE" | awk '{print $1}')"
          echo "Size  : $(du -sh "$IMAGE" | cut -f1)"

      - name: Upload kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Image-a73xq-ksu
          path: ${{ steps.find-image.outputs.image_path }}
          retention-days: 5
          compression-level: 0

      - name: Write job summary
        if: always()
        run: |
          IMAGE="${{ steps.find-image.outputs.image_name }}"
          DEVICE="a73xq"
          TYPE="KSU"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
## NovaKernel A73 Build Summary

| Field     | Value |
|-----------|-------|
| Device    | \`$DEVICE\` |
| Type      | **$TYPE** (ReSukiSU + Susfs 2.1.0) |
| Debug     | ${{ github.event.inputs.debug }} |
| Triggered | ${{ github.actor }} |
| Commit    | \`${{ github.sha }}\` |

$([ -n "$IMAGE" ] && echo "Output: \`$IMAGE\`" || echo "Build failed — no Image produced")
EOF

